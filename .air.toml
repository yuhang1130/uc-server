# ============================================================
# Air 热重载配置 (https://github.com/air-verse/air)
# 用于开发环境自动编译并重启 Go 服务
# ============================================================

# ----------------------------------------------------------
# 基础路径配置
# ----------------------------------------------------------

# 项目根目录，Air 会以此为基准监控文件变化
root = "."

# 测试数据目录，Air 不会监控此目录下的文件变更
testdata_dir = "testdata"

# 临时文件目录，用于存放编译后的二进制文件及中间产物
tmp_dir = "tmp"


# ----------------------------------------------------------
# [build] 构建相关配置
# ----------------------------------------------------------
[build]
  # 编译命令：构建可执行二进制文件到 tmp 目录
  # 保持与 bin 字段的路径一致
  cmd = "go build -o ./tmp/main cmd/server/main.go"

  # 编译后的二进制文件路径，Air 将运行此文件
  entrypoint = "./tmp/main"

  # 文件变化后延迟多少毫秒再触发构建（防抖，避免保存时频繁重启）
  delay = 1000

  # 监控的文件扩展名，只有这些类型的文件变更才会触发重新构建
  # go: 源码文件 | yaml/yml/toml: 配置文件 | env: 环境变量文件
  include_ext = ["go", "yaml", "yml", "toml", "env"]

  # 排除监控的目录，这些目录下的文件变更不会触发构建
  # 包括：依赖目录、临时目录、版本控制、IDE 配置、日志、部署文件等
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "deploy", ".git", ".idea", ".vscode", "logs"]

  # 排除监控的文件正则表达式
  # _test.go: 单元测试文件（修改测试不应重启服务）
  # _gen.go: 代码生成文件（应由工具重新生成而非手动修改）
  exclude_regex = ["_test.go", "_gen.go"]

  # 是否发送 SIGINT 信号停止旧进程（true = SIGINT 优雅关闭，false = SIGKILL 强制杀死）
  # 建议开启，让服务有机会完成当前请求、关闭数据库连接等清理操作
  send_interrupt = true

  # 发送终止信号后，等待旧进程退出的时间（给优雅关闭预留缓冲）
  # 500ms 足够完成一般性的资源释放，如数据库连接关闭
  kill_delay = "500ms"

  # 构建错误时是否停止运行旧进程
  # true: 编译失败时停止服务，避免旧代码继续运行造成误解
  # false: 编译失败时保持旧进程运行（适合需要服务始终可用的场景）
  stop_on_error = true

  # 构建错误日志文件路径，编译失败时错误信息会写入此文件便于排查
  log = "build-errors.log"


# ----------------------------------------------------------
# [color] 终端输出颜色配置
# ----------------------------------------------------------
[color]
  # 构建信息的颜色
  build = "yellow"

  # 主程序信息的颜色
  main = "magenta"

  # 运行器信息的颜色
  runner = "green"

  # 监控器（watcher）信息的颜色
  watcher = "cyan"


# ----------------------------------------------------------
# [log] 日志输出配置
# ----------------------------------------------------------
[log]
  # 是否只显示主程序（你的 Go 应用）的输出
  # false: 同时显示 Air 自身的监控、构建等日志
  # true:  仅显示应用日志（Air 自身日志被隐藏）
  main_only = false

  # 是否在 Air 的日志输出中显示时间戳
  time = false


# ----------------------------------------------------------
# [misc] 其他杂项配置
# ----------------------------------------------------------
[misc]
  # 退出 Air 时是否自动清理临时文件（编译产物、build-errors.log 等）
  clean_on_exit = true


# ----------------------------------------------------------
# [screen] 屏幕显示配置
# ----------------------------------------------------------
[screen]
  # 重新构建时是否清屏
  # true:  每次构建前清空终端，保持界面整洁
  # false: 保留历史输出，便于查看上一次运行的日志和错误
  clear_on_rebuild = false

  # 重新构建后是否保持终端滚动位置
  # true:  保持当前滚动位置，不会自动跳转到最新输出
  # false: 自动滚动到最新输出
  keep_scroll = true
